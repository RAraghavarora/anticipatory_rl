<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="640" viewBox="0 0 1800 640">
  <defs>
    <!-- Gradients -->
    <linearGradient id="inputGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="convGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="flatGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="mlpGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.20"/>
    </filter>

    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>

    <!-- Common font -->
    <style>
      .label { font: 600 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .meta  { font: 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .tiny  { font: 12px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .hdr   { font: 700 24px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .group { font: 600 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .ksp   { font: 12px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; opacity: .75 }
    </style>
  </defs>

  <!-- Title -->
  <text x="900" y="44" text-anchor="middle" class="hdr">ConvQNetwork</text>
  <text x="900" y="72" text-anchor="middle" class="tiny">
    Encoder (Conv-ReLU ×3) → Flatten → MLP (2×ReLU) → Q-values
  </text>

  <!-- Group badges -->
  <rect x="90"  y="110" width="1000" height="420" rx="16" ry="16" fill="#eef2ff" opacity=".55" />
  <text x="100" y="104" class="group">Encoder</text>
  <rect x="1220" y="110" width="460" height="420" rx="16" ry="16" fill="#ecfeff" opacity=".55" />
  <text x="1230" y="104" class="group">MLP Head</text>

  <!-- Helper: functionally these are hand-placed cuboids using front/top/side faces. -->
  <!-- ============ INPUT CUBOID (c, h, w) ============ -->
  <!-- Front face -->
  <g filter="url(#ds)">
    <g id="input">
      <!-- parameters -->
      <!-- front: x=120 y=210 w=160 h=120 ; depth: dx=16 dy=-12 -->
      <rect x="120" y="210" width="160" height="120" fill="url(#inputGrad)" stroke="#64748b" stroke-width="1.2"/>
      <!-- top -->
      <polygon points="120,210 280,210 296,198 136,198"
               fill="#a5b4fc" stroke="#64748b" stroke-width="1.2"/>
      <!-- side -->
      <polygon points="280,210 280,330 296,318 296,198"
               fill="#93c5fd" stroke="#64748b" stroke-width="1.2"/>
    </g>
  </g>
  <text x="200" y="352" text-anchor="middle" class="label">Input</text>
  <text x="200" y="372" text-anchor="middle" class="meta">(c, h, w)</text>

  <!-- Arrow to Conv1 -->
  <path d="M 300 270 C 330 270, 330 270, 350 270" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="325" y="258" text-anchor="middle" class="ksp">k3 s1 p1</text>

  <!-- ============ CONV1 (32, h, w) ============ -->
  <g filter="url(#ds)">
    <g id="conv1">
      <!-- front: x=360 y=210 w=180 h=120 ; depth: dx=22 dy=-12 -->
      <rect x="360" y="210" width="180" height="120" fill="url(#convGrad)" stroke="#4338ca" stroke-width="1.2"/>
      <polygon points="360,210 540,210 562,198 382,198"
               fill="#818cf8" stroke="#4338ca" stroke-width="1.2"/>
      <polygon points="540,210 540,330 562,318 562,198"
               fill="#60a5fa" stroke="#4338ca" stroke-width="1.2"/>
    </g>
  </g>
  <text x="450" y="352" text-anchor="middle" class="label">Conv 3×3 + ReLU</text>
  <text x="450" y="372" text-anchor="middle" class="meta">32 ch · (h, w)</text>

  <!-- Arrow to Conv2 -->
  <path d="M 565 270 C 600 260, 620 260, 650 268" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="610" y="248" text-anchor="middle" class="ksp">k3 s2 p1</text>

  <!-- ============ CONV2 (64, h1, w1) ============ -->
  <g filter="url(#ds)">
    <g id="conv2">
      <!-- front: x=680 y=230 w=110 h=85 ; depth: dx=34 dy=-12 -->
      <rect x="680" y="230" width="110" height="85" fill="url(#convGrad)" stroke="#4338ca" stroke-width="1.2"/>
      <polygon points="680,230 790,230 824,218 714,218"
               fill="#818cf8" stroke="#4338ca" stroke-width="1.2"/>
      <polygon points="790,230 790,315 824,303 824,218"
               fill="#60a5fa" stroke="#4338ca" stroke-width="1.2"/>
    </g>
  </g>
  <text x="735" y="352" text-anchor="middle" class="label">Conv 3×3 + ReLU</text>
  <text x="735" y="372" text-anchor="middle" class="meta">64 ch · (h₁, w₁)</text>

  <!-- Arrow to Conv3 -->
  <path d="M 830 270 C 860 262, 875 262, 900 268" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="866" y="250" text-anchor="middle" class="ksp">k3 s2 p1</text>

  <!-- ============ CONV3 (64, h2, w2) ============ -->
  <g filter="url(#ds)">
    <g id="conv3">
      <!-- front: x=920 y=240 w=70 h=55 ; depth: dx=34 dy=-12 -->
      <rect x="920" y="240" width="70" height="55" fill="url(#convGrad)" stroke="#4338ca" stroke-width="1.2"/>
      <polygon points="920,240 990,240 1024,228 954,228"
               fill="#818cf8" stroke="#4338ca" stroke-width="1.2"/>
      <polygon points="990,240 990,295 1024,283 1024,228"
               fill="#60a5fa" stroke="#4338ca" stroke-width="1.2"/>
    </g>
  </g>
  <text x="955" y="352" text-anchor="middle" class="label">Conv 3×3 + ReLU</text>
  <text x="955" y="372" text-anchor="middle" class="meta">64 ch · (h₂, w₂)</text>

  <!-- Arrow to Flatten -->
  <path d="M 1030 268 C 1070 268, 1100 268, 1110 270" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ============ FLATTEN ============ -->
  <g filter="url(#ds)">
    <rect x="1120" y="270" width="180" height="30" rx="6" ry="6"
          fill="url(#flatGrad)" stroke="#4f46e5" stroke-width="1.2"/>
  </g>
  <text x="1210" y="330" text-anchor="middle" class="label">Flatten</text>
  <text x="1210" y="350" text-anchor="middle" class="meta">→ 64 · h₂ · w₂</text>

  <!-- Arrow to MLP1 -->
  <path d="M 1305 285 C 1320 285, 1330 285, 1340 285" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ============ MLP (two hidden layers) ============ -->
  <!-- Linear 1 -->
  <g filter="url(#ds)">
    <rect x="1350" y="210" width="64" height="180" rx="10" ry="10"
          fill="url(#mlpGrad)" stroke="#0891b2" stroke-width="1.2"/>
  </g>
  <text x="1382" y="408" text-anchor="middle" class="label">Linear</text>
  <text x="1382" y="428" text-anchor="middle" class="meta">→ hidden_dim</text>
  <text x="1382" y="446" text-anchor="middle" class="tiny">+ ReLU</text>

  <!-- Arrow to Linear 2 -->
  <path d="M 1416 300 C 1430 300, 1440 300, 1446 300" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Linear 2 -->
  <g filter="url(#ds)">
    <rect x="1456" y="210" width="64" height="180" rx="10" ry="10"
          fill="url(#mlpGrad)" stroke="#0891b2" stroke-width="1.2"/>
  </g>
  <text x="1488" y="408" text-anchor="middle" class="label">Linear</text>
  <text x="1488" y="428" text-anchor="middle" class="meta">→ hidden_dim</text>
  <text x="1488" y="446" text-anchor="middle" class="tiny">+ ReLU</text>

  <!-- Arrow to Output -->
  <path d="M 1520 300 C 1535 300, 1550 300, 1562 300" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <g filter="url(#ds)">
    <rect x="1570" y="240" width="100" height="120" rx="12" ry="12"
          fill="url(#mlpGrad)" stroke="#0891b2" stroke-width="1.2"/>
  </g>
  <text x="1620" y="378" text-anchor="middle" class="label">Output</text>
  <text x="1620" y="398" text-anchor="middle" class="meta">num_actions (Q)</text>

  <!-- Legend -->
  <g>
    <text x="900" y="590" text-anchor="middle" class="tiny">
      h₁ = ⌊(h + 1)/2⌋, w₁ = ⌊(w + 1)/2⌋; h₂ = ⌊(h₁ + 1)/2⌋, w₂ = ⌊(w₁ + 1)/2⌋
      · conv_out = 64 · h₂ · w₂
    </text>
  </g>
</svg>