# Task distribution is uniform P(τ) per author clarification
# These weights are ignored; uniform sampling is always used
task_distribution:
  serve_water: 0.35
  make_coffee: 0.25
  make_fruit_bowl: 0.15
  clear_containers: 0.15
  wash_objects: 0.10

# Service location distribution is ignored; uniform sampling is always used
service_location_distribution:
  pass_counter: 0.34
  table_left: 0.33
  table_center: 0.33
  table_right: 0.33

# Wash kind distribution is ignored; uniform sampling is always used
wash_kind_distribution:
  cup: 0.40
  mug: 0.30
  bowl: 0.30

